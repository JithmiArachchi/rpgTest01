<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4 text-center">Customer Management System</h1>

    <!-- Add New Customer Button -->
    <div class="mb-3 text-end">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#customerModal" onclick="resetForm()">
            Add New Customer
        </button>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5>All Customers</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover" id="customerTable">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>City</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add New Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="customerForm">
                    <input type="hidden" id="custId">
                    <div class="mb-3">
                        <label class="form-label">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="custName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" id="address">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" id="city">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" onclick="saveCustomer()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let editingId = null;

    // Load all customers
    async function loadCustomers() {
        try {
            const response = await fetch('/api/customers');
            const customers = await response.json();
            const tbody = document.querySelector('#customerTable tbody');
            tbody.innerHTML = '';

            customers.forEach(c => {
                const row = `
                    <tr>
                        <td>${c.custId}</td>
                        <td>${c.custName}</td>
                        <td>${c.address || '-'}</td>
                        <td>${c.city || '-'}</td>
                        <td>${c.phone || '-'}</td>
                        <td>${c.email || '-'}</td>
                        <td><span class="badge bg-${c.status === 'A' ? 'success' : 'secondary'}">${c.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editCustomer(${c.custId})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.custId})">Delete</button>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        } catch (error) {
            alert('Error loading data: ' + error);
        }
    }

    // Save or Update Customer
    async function saveCustomer() {
        const customer = {
            custName: document.getElementById('custName').value.trim(),
            address: document.getElementById('address').value.trim(),
            city: document.getElementById('city').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            email: document.getElementById('email').value.trim(),
            status: 'A'
        };

        if (!customer.custName) {
            alert("Name is required!");
            return;
        }

        try {
            let url = '/api/customers';
            let method = 'POST';

            if (editingId) {
                url = `/api/customers/${editingId}`;
                method = 'PUT';
                customer.custId = editingId;
            }

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(customer)
            });

            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('customerModal')).hide();
                loadCustomers();
                resetForm();
            } else {
                alert('Failed to save! Please try again.');
            }
        } catch (error) {
            alert('Error: ' + error);
        }
    }

    // Edit Customer
    function editCustomer(id) {
        fetch(`/api/customers/${id}`)
            .then(response => response.json())
            .then(customer => {
                editingId = customer.custId;
                document.getElementById('custId').value = customer.custId;
                document.getElementById('custName').value = customer.custName || '';
                document.getElementById('address').value = customer.address || '';
                document.getElementById('city').value = customer.city || '';
                document.getElementById('phone').value = customer.phone || '';
                document.getElementById('email').value = customer.email || '';
                document.getElementById('modalTitle').textContent = 'Edit Customer';
                const modal = new bootstrap.Modal(document.getElementById('customerModal'));
                modal.show();
            })
            .catch(error => alert('Error while loading customer: ' + error));
    }

    // Delete Customer
    async function deleteCustomer(id) {
        if (confirm('Are you sure you want to delete this customer?')) {
            try {
                const response = await fetch(`/api/customers/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadCustomers();
                } else {
                    alert('Failed to delete!');
                }
            } catch (error) {
                alert('Error: ' + error);
            }
        }
    }

    // Reset Form for New Customer
    function resetForm() {
        editingId = null;
        document.getElementById('customerForm').reset();
        document.getElementById('modalTitle').textContent = 'Add New Customer';
    }

    // Load customers when page loads
    window.onload = loadCustomers;
</script>
</body>
</html>
